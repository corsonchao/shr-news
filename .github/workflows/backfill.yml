name: Weekly Backfill (run once)

# No schedule — this is manual only. Go to the Actions tab, pick this workflow,
# and click "Run workflow". Safe to run more than once (the brain de-dupes).
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Run backfill
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO:   ${{ secrets.MAIL_TO }}
          SITE_URL:  ${{ secrets.SITE_URL }}
        run: python backfill.py
      - name: Commit brain + website
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge docs
          git diff --staged --quiet || git commit -m "Weekly backfill $(date -u +%F)"
          git pull --rebase --autostash origin main
          git push
