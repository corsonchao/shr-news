name: Rebuild website only

# Manual trigger only. Rebuilds docs/ from the existing knowledge base.
# No scraping, no email, no LLM calls, no knowledge-base changes.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Rebuild site from knowledge base
        run: python rebuild_site.py
      - name: Commit updated website
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add docs
          git diff --staged --quiet || git commit -m "Rebuild site $(date -u +%F)"
          git push
