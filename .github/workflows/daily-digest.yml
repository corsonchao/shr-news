name: Daily SHR Geothermal Digest

on:
  schedule:
    - cron: '13 7 * * *'   # 07:13 UTC daily. Avoid :00 (queue congestion). Times are UTC.
  workflow_dispatch:        # manual trigger for testing

permissions:
  contents: write           # to commit the updated brain + website

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4          # brings the existing brain (knowledge/) into the run

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO:   ${{ secrets.MAIL_TO }}
          SITE_URL:  ${{ secrets.SITE_URL }}   # e.g. https://you.github.io/shr-digest/
        run: python main.py

      - name: Commit updated brain + website
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge docs
          git diff --staged --quiet || git commit -m "Digest $(date -u +%F)"
          git pull --rebase --autostash origin main
          git push
